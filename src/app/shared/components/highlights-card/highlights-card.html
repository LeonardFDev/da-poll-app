<div class="highlights-card" (mouseenter)="hover.set(true)" (mouseleave)="hover.set(false)">
    <div class="highlights-card__text__h1">
        <span class="highlights-card__text-h1__text">{{highlightsCardText}}</span>
        <h1 class="highlights-card__text-h1__h1">{{highlightsCardH1}}</h1>
    </div>
    <app-survey-status [colorType]="'primary'" [statusText]="'Ends in 1 Day'" [isPartOfHighlightsCard]="true" [hovered]="hover()"></app-survey-status>
</div>
