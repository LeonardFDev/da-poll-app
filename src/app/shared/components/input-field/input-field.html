@if(type == 'inputText'){
    <input [formControl]="nameControl" class="input-field" type="text">
}

@else if(type == 'textarea'){
    <textarea [formControl]="nameControl" class="input-field input-field--textarea"></textarea>
}

@else if(type == 'inputDate'){
    <input [formControl]="nameControl" class="input-field input-field--date" type="date">
}
