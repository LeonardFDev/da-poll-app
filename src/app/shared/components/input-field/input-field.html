@if(type == 'inputText'){
    <input (blur)="noWhitespace()" [class.input-field--error]="dateInvalid" [formControl]="nameControl" class="input-field" type="text">
}

@else if(type == 'textarea'){
    <textarea (blur)="noWhitespace()" [formControl]="nameControl" class="input-field input-field--textarea"></textarea>
}

@else if(type == 'inputDate'){
    <input (blur)="noWhitespace()" [formControl]="nameControl" (input)="calendarValueChange()" class="input-field input-field--date" type="date">
}
