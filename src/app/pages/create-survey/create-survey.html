<section class="page">
    <div class="page__body">

        <header class="header">
            <div routerLink="" class="header__img-box">
                <img src="assets/img/logo-purple-dark.png" alt="icon">
            </div>
        </header>

        <div class="create-survey">
            <app-survey-status [colorType]="'tertiary'" [statusText]="'Draft'"></app-survey-status>

            <div class="create-survey__h1-btn">
                <h1 class="create-survey__h1-btn__h1">Create new survey</h1>
                <app-secondary-button routerLink="" [btnText]="'Cancel'" [withoutSpan]="true" [withImg]="true" [imgUrl]="'assets/img/x-create-survey.png'" class="create-survey__h1-btn__btn"></app-secondary-button>
            </div>

            <div class="form">
                <div class="form__boxOne">
                    <div class="form__boxOne__left">
                        <div class="unit">
                            <div class="unit__span-button">
                                <span class="unit__span-button__span">Survey name</span>
                                <app-delete-button (click)="deleteInputField('name')" class="unit__span-button__button"></app-delete-button>
                            </div>
                            <div class="unit__input-button">
                                <app-input-field (isErrorOutput)="fromInputFieldsToCreateSurvey($event)" [nameControl]="csService.nameControl('name')" class="unit__input-button__input"></app-input-field>
                                <app-delete-button (click)="deleteInputField('name')" class="unit__input-button__button unit__input-button__button--margin-r8"></app-delete-button>
                            </div>
                        </div>
                        <div class="unit__extra">
                            <div class="unit">
                                <div class="unit__span-button">
                                    <span class="unit__span-button__span">Set end Date (optional)</span>
                                    <app-delete-button (click)="deleteInputField('endDate')" class="unit__span-button__button"></app-delete-button>
                                </div>
                                <div class="unit__input-button">
                                    <app-input-field [nameControl]="csService.nameControl('endDate')" [type]="'inputDate'" class="unit__input-button__input"></app-input-field>
                                    <app-delete-button (click)="deleteInputField('endDate')" class="unit__input-button__button"></app-delete-button>
                                </div>
                            </div>
                            <app-drop-down-menu [isPartOfCreateSurvey]="true" [dropDownText]="'Choose category'"></app-drop-down-menu>
                        </div>
                    </div>
                    <div class="form__boxOne__right">
                        <div class="unit">
                            <div class="unit__span-button">
                                <span class="unit__span-button__span">Describing text (optional)</span>
                                <app-delete-button (click)="deleteInputField('description')" class="unit__span-button__button"></app-delete-button>
                            </div>
                            <div class="unit__input-button">
                                <app-input-field [nameControl]="csService.nameControl('description')" [type]="'textarea'" class="unit__input-button__input"></app-input-field>
                                <app-delete-button (click)="deleteInputField('description')" class="unit__input-button__button unit__input-button__button--alignSelt-start"></app-delete-button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form__boxTwo">
                    @for (item of questionNumberList(); track item.id; let i= $index) {
                        <app-create-question (isErrorOutput)="fromInputFieldsToCreateSurvey($event)" (outputQuestionId)="removeQuestion($event)" [questionId]="item.id" [questionNumber]="listNumber(i)"></app-create-question>
                    }
                    <app-secondary-button (click)="addQuestion()" [btnText]="'Add next question'" [withImg]="true" [imgUrl]="'/assets/img/add_circle_secondary-button.png'"></app-secondary-button>
                </div>
            </div>
            <div class="create-survey__footer">
                <span [class.create-survey__footer__span--error-on]="isError" class="create-survey__footer__span">*The fields with the red box must be filled in.</span>
                <app-primary-button (click)="saveSurvey()" [btnText]="'Publish'" [withIcon]="{'isWithIcon': true, 'icon': '✓', 'iconWidth':18}"></app-primary-button>
            </div>
        </div>
    </div>

</section>

<section [class.overlay--show]="showOverlay" class="overlay">
    <div [class.overlay__body--show]="showOverlayBox()" class="overlay__body">
        <div class="overlay__body__box">
            <span class="overlay__body__box__span">Your survey is now published</span>
            <img [routerLink]="['/view-survey', surveyId]" class="overlay__body__box__img" src="assets/img/overlay-close.png" alt="close icon">
        </div>
    </div>
</section>
